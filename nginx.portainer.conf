# Portainer / Docker nginx config (nginx container in the same stack as the app).
# proxy_pass uses the Docker service name "app" on internal port 3000.
#
# Mount this file into your nginx container, e.g.:
#   /etc/nginx/conf.d/default.conf
#
# Replace cpffonline.com with your real domain and update SSL paths.

server {
    listen 80;
    listen [::]:80;
    server_name cpffonline.com www.cpffonline.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cpffonline.com www.cpffonline.com;

    ssl_certificate /etc/letsencrypt/live/cpffonline.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpffonline.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location /api/health {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 10s;
        proxy_connect_timeout 10s;
        access_log off;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_request_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /_next/static {
        proxy_pass http://app:3000;
        proxy_set_header Accept-Encoding "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        gzip off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /_next/data {
        proxy_pass http://app:3000;
        proxy_set_header Accept-Encoding "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        gzip off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /static {
        proxy_pass http://app:3000;
        proxy_set_header Accept-Encoding "";
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/woff2;
    gzip_disable "MSIE [1-6]\.";

    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
}
